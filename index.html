<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');
  :root{
    --ink:#16140f;--ink-2:#211e17;--ink-3:#2c2820;--line:#3a3528;
    --paper:#f3ede0;--muted:#9a917e;--muted-2:#6f6857;
    --clay:#d98f4e;--green:#7faa6a;--amber:#d9a441;--red:#cc6b53;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--ink);color:var(--paper);font-family:'Inter',sans-serif}
  body{max-width:520px;margin:0 auto;padding:20px 16px 120px;min-height:100vh}
  ::selection{background:var(--clay);color:var(--ink)}
  .head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px}
  .brand{font-family:'Archivo Narrow';font-weight:700;font-size:22px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted-2)}
  .brand span{color:var(--clay)}
  .date{font-size:12px;color:var(--muted);font-weight:500}
  .nav{background:none;border:1px solid var(--line);color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:6px 11px;border-radius:999px;cursor:pointer}
  .nav:hover{color:var(--paper);border-color:var(--muted)}

  .hero{background:var(--ink-2);border:1px solid var(--line);border-radius:18px;padding:22px 20px 20px;margin-bottom:14px;position:relative;overflow:hidden}

  /* consistency hero */
  .conhero{padding:18px 18px 16px}
  .statusrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .statusword{font-family:'Archivo Narrow';font-weight:700;font-size:22px;letter-spacing:.02em;text-transform:uppercase}
  .statusword.green{color:var(--green)} .statusword.amber{color:var(--amber)} .statusword.red{color:var(--red)} .statusword.clay{color:var(--clay)}
  .countdown{font-size:11px;font-weight:600;color:var(--clay);background:#2c2820;border:1px solid #4a4330;padding:5px 10px;border-radius:999px;cursor:pointer;white-space:nowrap}
  .countdown:hover{border-color:var(--clay)}
  .conscore{font-family:'Archivo Narrow';font-weight:700;font-size:60px;line-height:.95;font-variant-numeric:tabular-nums}
  .conscore.green{color:var(--green)} .conscore.amber{color:var(--amber)} .conscore.red{color:var(--red)} .conscore.clay{color:var(--clay)}
  .conscore small{font-size:24px;color:var(--muted);font-weight:600;margin-left:2px}
  .conlab{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-top:1px}
  .behaviours{display:flex;gap:6px;margin:14px 0 12px;flex-wrap:wrap}
  .bchip{flex:1;min-width:56px;background:#2c2820;border:1px solid var(--line);border-radius:11px;padding:9px 6px;text-align:center}
  .bchip .bk{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .bchip .bv{font-family:'Archivo Narrow';font-weight:700;font-size:18px;margin-top:2px;font-variant-numeric:tabular-nums}
  .bchip .bv.green{color:var(--green)} .bchip .bv.amber{color:var(--amber)} .bchip .bv.red{color:var(--red)}
  .bchip .bv small{font-size:10px;color:var(--muted);font-weight:600}
  .statusline{font-size:13.5px;line-height:1.5;color:var(--paper);background:#1c1a13;border-radius:11px;padding:12px 13px;border-left:3px solid var(--clay)}
  .streakrow{display:flex;gap:8px;margin:0 0 12px}
  .streakrow .stk{flex:1;background:#2c2820;border:1px solid var(--line);border-radius:11px;padding:9px 12px;font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
  .streakrow .stk .sv{font-family:'Archivo Narrow';font-size:18px;color:var(--paper);font-weight:700;margin-right:5px;letter-spacing:0}

  /* trend weight card */
  .trendcard{background:var(--ink-2);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:14px}
  .trendcard .trleft{flex-shrink:0}
  .trendcard .trk{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .trendcard .trrate{font-family:'Archivo Narrow';font-weight:700;font-size:22px;margin-top:3px}
  .trendcard .trrate.green{color:var(--green)} .trendcard .trrate.amber{color:var(--amber)}
  .trendcard .trnums{display:flex;gap:16px;margin-left:auto}
  .trendcard .trn{text-align:center}
  .trendcard .tnv{font-family:'Archivo Narrow';font-weight:700;font-size:21px;font-variant-numeric:tabular-nums}
  .trendcard .tnk{font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-top:1px}
  .macsep{height:1px;background:var(--line);margin:4px 2px 0;opacity:.5}

  /* strength progress card */
  .strengthcard{background:var(--ink-2);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:14px}
  .strengthcard.win{background:linear-gradient(135deg,#262017,#211e17);border-color:#4a4330}
  .strengthcard.quiet{opacity:.85}
  .strengthcard .sck{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .strengthcard.win .sck{color:var(--clay)}
  .strengthcard .scbig{font-family:'Archivo Narrow';font-weight:700;font-size:30px;line-height:1;margin:5px 0 6px;font-variant-numeric:tabular-nums}
  .strengthcard.win .scbig{color:var(--green)}
  .strengthcard .scsub{font-size:12.5px;line-height:1.45;color:var(--muted-2)}

  /* view nav */
  .viewnav{display:flex;gap:6px;margin-bottom:14px;background:var(--ink-2);border:1px solid var(--line);border-radius:13px;padding:4px}
  .viewnav .vn{flex:1;background:none;border:none;color:var(--muted);font-family:'Inter';font-weight:600;font-size:12.5px;padding:9px 4px;border-radius:10px;cursor:pointer;letter-spacing:.02em}
  .viewnav .vn.active{background:var(--ink-3);color:var(--paper)}

  /* weekly review */
  .wkgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
  .wkcell{background:var(--ink-2);border:1px solid var(--line);border-radius:13px;padding:14px 15px}
  .wkcell .wk{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .wkcell .wv{font-family:'Archivo Narrow';font-weight:700;font-size:26px;margin-top:4px;font-variant-numeric:tabular-nums}
  .wkcell .wv.green{color:var(--green)} .wkcell .wv.amber{color:var(--amber)}
  .bestcard{background:linear-gradient(135deg,#262017,#211e17);border:1px solid #4a4330;border-radius:14px;padding:15px 16px;margin-bottom:14px}
  .bestcard .bk{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--clay);font-weight:700}
  .bestcard .bv{font-size:16px;font-weight:600;margin-top:5px;line-height:1.35}

  /* forecast */
  .fcard{background:var(--ink-2);border:1px solid var(--line);border-radius:14px;padding:16px 17px;margin-bottom:12px}
  .fcard.hero-f{border-color:#4a4330;background:linear-gradient(135deg,#262017,#211e17)}
  .fcard .fck{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .fcard.hero-f .fck{color:var(--clay)}
  .fcard .fcbig{font-family:'Archivo Narrow';font-weight:700;font-size:38px;line-height:1;margin:6px 0 8px;font-variant-numeric:tabular-nums}
  .fcard .fcbig small{font-size:18px;color:var(--muted);font-weight:600}
  .fcard .fcbig.green{color:var(--green)} .fcard .fcbig.amber{color:var(--amber)} .fcard .fcbig.red{color:var(--red)}
  .confparts{display:flex;flex-wrap:wrap;gap:10px;font-size:12px;color:var(--muted);margin-top:2px}
  .confparts b{color:var(--muted-2);font-weight:600}
  .fcard .fcsub{font-size:13px;line-height:1.5;color:var(--muted-2)}
  .fcard .fcsub b{color:var(--paper);font-weight:600}
  .fnote{font-size:12px;line-height:1.5;color:var(--muted);background:#1c1a13;border-radius:11px;padding:12px 13px;margin-bottom:20px;border-left:3px solid var(--line)}

  /* cycle: period tick */

<body>

<div class="head">

</div>

  </div>

<script>
const KEY='deficit_days_v2';
const SKEY='deficit_settings_v1';
const DEFAULTS={rmr:1600,deficitLo:700,deficitHi:800,proteinLo:100,proteinHi:120,calsLo:1400,calsHi:1500,strengthGoal:3,sleepTarget:7,stepsGoal:8000,cycleLen:28,goalLabel:'Bali trip',goalDate:'2026-09-10',goalWeight:66,apiKey:'',proxyUrl:'',passHash:''};
let SET=loadSettings();
// derived shortcuts used across the app
let RMR_FALLBACK,TARGETS,WEEKLY_STRENGTH_GOAL;
function applySettings(){
  RMR_FALLBACK=SET.rmr;
  TARGETS={cals:[SET.calsLo,SET.calsHi],protein:[SET.proteinLo,SET.proteinHi],deficit:[SET.deficitLo,SET.deficitHi]};
  WEEKLY_STRENGTH_GOAL=SET.strengthGoal;
}
function loadSettings(){try{return Object.assign({},DEFAULTS,JSON.parse(localStorage.getItem(SKEY))||{})}catch{return Object.assign({},DEFAULTS)}}
function saveSettings(){localStorage.setItem(SKEY,JSON.stringify(SET));applySettings()}
applySettings();
let DB=load();
let view='today';
let coachCache={}; // key -> {text, sig}

// central API caller.
// Scope-style: uses your own Anthropic API key, saved on this device only.
// When running as an artifact inside Claude, the key is handled for you, so a blank key still works here.
async function callClaude(messages,maxTokens){
  const key=(SET.apiKey||'').trim();
  const headers={'Content-Type':'application/json'};
  // direct call to Anthropic with your key
  if(key){
    headers['x-api-key']=key;
    headers['anthropic-version']='2023-06-01';
    headers['anthropic-dangerous-direct-browser-access']='true';
  }
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers,
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:maxTokens||300,messages})
  });
  return res.json();

  /* ---- Optional safer fallback: route through a Cloudflare Worker proxy instead.
     If you ever want the key off your device entirely, set SET.proxyUrl and use this instead:
  const url=SET.proxyUrl?SET.proxyUrl.trim():'https://api.anthropic.com/v1/messages';
  const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:maxTokens||300,messages})});
  return res.json();
  ---- */
}

function load(){try{return JSON.parse(localStorage.getItem(KEY))||{}}catch{return{}}}
function save(){localStorage.setItem(KEY,JSON.stringify(DB))}
function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function blankDay(){return{food:[],workouts:[],resting:null,active:null,steps:null,distance:null,weight:null,photo:false,sleep:null,knee:null,energy:null,hunger:null,cravings:null,bloating:null,periodStart:false}}
function day(k){k=k||todayKey();if(!DB[k])DB[k]=blankDay();if(DB[k].photo===undefined)DB[k].photo=false;if(DB[k].sleep===undefined)DB[k].sleep=null;if(DB[k].knee===undefined)DB[k].knee=null;if(DB[k].periodStart===undefined)DB[k].periodStart=false;return DB[k]}
function shortDate(k){const[y,m,d]=k.split('-');const dt=new Date(y,m-1,d);return dt.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'})}

function totals(d){
  const cals=d.food.reduce((s,f)=>s+(f.cals||0),0);
  const protein=d.food.reduce((s,f)=>s+(f.protein||0),0);
  const burn=(d.resting||0)+(d.active||0);
  const base=d.resting?burn:(RMR_FALLBACK+(d.active||0));
  const deficit=base-cals;
  return{cals,protein,burn,base,deficit,hasBurn:!!(d.resting||d.active)};
}
function deficitClass(def,hasBurn){
  if(!hasBurn)return'clay';
  if(def>=TARGETS.deficit[0]&&def<=TARGETS.deficit[1]+250)return'green';
  if(def>=400)return'amber';
  if(def<0)return'red';
  return'amber';
}

/* ===== consistency engine ===== */
function dateKeyOff(off){const d=new Date();d.setDate(d.getDate()-off);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
// per-day: which behaviours were hit. Consistency = things you CHOOSE: protein, calories, strength, logging.
// Sleep and knee are Recovery (tracked, shown, but never punish the consistency score).
function dayCompliance(d){
  const t=totals(d);const items={};
  if((d.food||[]).length){
    items.protein=t.protein>=TARGETS.protein[0];
    items.calories=(t.cals>=TARGETS.cals[0]-150 && t.cals<=TARGETS.cals[1]+150);
  }
  items.weight=(d.weight!=null);
  let hits=0,possible=0;
  ['protein','calories','weight'].forEach(k=>{if(items[k]!==undefined){possible++;if(items[k])hits++;}});
  return{hits,possible,items};
}
// rolling-window consistency score + behaviour breakdown + strength session count
function consistency(windowDays){
  windowDays=windowDays||30;
  let hits=0,possible=0,loggedDays=0,strengthSessions=0;
  let pH=0,pP=0,cH=0,cP=0,wH=0;
  for(let i=0;i<windowDays;i++){
    const d=DB[dateKeyOff(i)];if(!d)continue;
    const c=dayCompliance(d);
    if(c.possible>0||(d.workouts||[]).length)loggedDays++;
    hits+=c.hits;possible+=c.possible;
    if(c.items.protein!==undefined){pP++;if(c.items.protein)pH++;}
    if(c.items.calories!==undefined){cP++;if(c.items.calories)cH++;}
    if(c.items.weight)wH++;
    strengthSessions+=(d.workouts||[]).filter(w=>/strength|weight|lift|resist/i.test(w.name)).length;
  }
  return{score:possible?Math.round(hits/possible*100):null,loggedDays,strengthSessions,
    breakdown:{protein:{hit:pH,of:pP},calories:{hit:cH,of:cP},weight:{hit:wH,of:windowDays}}};
}
// recovery: sleep + knee, tracked but never scored into consistency
function recovery(windowDays){
  windowDays=windowDays||30;
  let sleepSum=0,sleepN=0,kneeSum=0,kneeN=0,kneeMax=0;
  for(let i=0;i<windowDays;i++){
    const d=DB[dateKeyOff(i)];if(!d)continue;
    if(d.sleep!=null){sleepSum+=d.sleep;sleepN++;}
    if(d.knee!=null){kneeSum+=d.knee;kneeN++;if(d.knee>kneeMax)kneeMax=d.knee;}
  }
  return{avgSleep:sleepN?sleepSum/sleepN:null,avgKnee:kneeN?kneeSum/kneeN:null,kneeMax:kneeN?kneeMax:null,sleepN,kneeN};
}

/* ===== cycle engine: anchor-based, reports patterns from real data only ===== */
function ckToDate(k){const[y,m,d]=k.split('-');return new Date(y,m-1,d);}
function periodStarts(){return Object.keys(DB).filter(k=>DB[k].periodStart).sort();}
function cycleLen(){return SET.cycleLen||28;}
function cycleNow(){
  const L=cycleLen();const starts=periodStarts();
  if(!starts.length)return{day:null,daysToNext:null,lastStart:null,overdue:false,overdueDays:0};
  const last=ckToDate(starts[starts.length-1]);const today=new Date();today.setHours(0,0,0,0);
  const elapsed=Math.floor((today-last)/86400000); // 0 on start day
  const rawDay=elapsed+1;
  const day=(elapsed%L)+1;          // wrapped 1..L, used for bucketing + display
  const overdue=rawDay>L;
  const overdueDays=overdue?rawDay-L:0;
  let daysToNext=L-((rawDay-1)%L);if(daysToNext===L)daysToNext=0;
  return{day,rawDay,daysToNext,lastStart:starts[starts.length-1],overdue,overdueDays};
}
function softPhase(day){
  const L=cycleLen();if(day==null)return null;
  const d=((day-1)%L)+1;
  if(d<=5)return'menstrual window';
  if(d<=Math.round(L*0.45))return'follicular (estimated)';
  if(d<=Math.round(L*0.55))return'around ovulation (estimated)';
  return'late-cycle window (estimated)';
}
function completedCycles(){
  const L=cycleLen();const starts=periodStarts().map(ckToDate);let n=0;
  for(let i=1;i<starts.length;i++){const gap=Math.round((starts[i]-starts[i-1])/86400000);if(gap>=L-10&&gap<=L+14)n++;}
  return n;
}
function cycleConfidence(){const n=completedCycles();if(n>=5)return{level:'High',n};if(n>=2)return{level:'Moderate',n};return{level:'Low',n};}
function cycleBucket(day){
  const L=cycleLen();const d=((day-1)%L)+1;
  if(d<=5)return'Menstrual';if(d<=Math.round(L*0.45))return'Follicular';
  if(d<=Math.round(L*0.55))return'Ovulation';return'Late cycle';
}
function patternByPhase(){
  const L=cycleLen();const starts=periodStarts().map(ckToDate).sort((a,b)=>a-b);
  if(starts.length<1)return null;
  const buckets={'Menstrual':[1,5],'Follicular':[6,Math.round(L*0.45)],'Ovulation':[Math.round(L*0.45)+1,Math.round(L*0.55)],'Late cycle':[Math.round(L*0.55)+1,L]};
  const agg={};Object.keys(buckets).forEach(b=>agg[b]={energy:[],hunger:[],cravings:[],bloating:[],knee:[],strengthDays:0,days:0});
  const keys=Object.keys(DB).sort();
  keys.forEach(k=>{
    const date=ckToDate(k);let anchor=null;
    for(let i=starts.length-1;i>=0;i--){if(starts[i]<=date){anchor=starts[i];break;}}
    if(!anchor)return;
    const cd=Math.floor((date-anchor)/86400000)+1;if(cd<1||cd>L+5)return;
    let bucket=null;for(const b in buckets){if(cd>=buckets[b][0]&&cd<=buckets[b][1]){bucket=b;break;}}
    if(!bucket)return;
    const d=DB[k];const a=agg[bucket];a.days++;
    if(d.energy!=null)a.energy.push(d.energy);
    if(d.hunger!=null)a.hunger.push(d.hunger);
    if(d.cravings!=null)a.cravings.push(d.cravings);
    if(d.bloating!=null)a.bloating.push(d.bloating);
    if(d.knee!=null)a.knee.push(d.knee);
    if((d.workouts||[]).some(w=>/strength|weight|lift|resist/i.test(w.name)))a.strengthDays++;
  });
  // weight delta by phase: phase mean minus that cycle's mean, averaged across cycles
  const byCycle={};
  keys.forEach(k=>{const d=DB[k];if(d.weight==null)return;const date=ckToDate(k);let anchor=null;
    for(let i=starts.length-1;i>=0;i--){if(starts[i]<=date){anchor=+starts[i];break;}}
    if(anchor==null)return;const cd=Math.floor((date-new Date(anchor))/86400000)+1;(byCycle[anchor]=byCycle[anchor]||[]).push({cd,w:d.weight});});
  const phaseDeltas={Menstrual:[],Follicular:[],Ovulation:[],'Late cycle':[]};
  Object.values(byCycle).forEach(pts=>{if(pts.length<3)return;const cm=pts.reduce((s,p)=>s+p.w,0)/pts.length;
    const pb={Menstrual:[],Follicular:[],Ovulation:[],'Late cycle':[]};
    pts.forEach(p=>{for(const b in buckets){if(p.cd>=buckets[b][0]&&p.cd<=buckets[b][1]){pb[b].push(p.w);break;}}});
    Object.keys(pb).forEach(b=>{if(pb[b].length){const m=pb[b].reduce((s,x)=>s+x,0)/pb[b].length;phaseDeltas[b].push(m-cm);}});});
  const avg=a=>a.length?a.reduce((s,x)=>s+x,0)/a.length:null;
  const out={};Object.keys(buckets).forEach(b=>{const a=agg[b];
    out[b]={days:a.days,energy:avg(a.energy),hunger:avg(a.hunger),cravings:avg(a.cravings),bloating:avg(a.bloating),knee:avg(a.knee),weightDelta:avg(phaseDeltas[b]),strengthDays:a.strengthDays};});
  return out;
}
function cycleCoachFact(){
  const conf=cycleConfidence();if(conf.n<2)return null;
  const now=cycleNow();if(now.day==null)return null;
  const pat=patternByPhase();if(!pat)return null;
  const bucket=cycleBucket(now.day);const p=pat[bucket];
  return{confidence:conf.level,cycles:conf.n,bucket,phase:softPhase(now.day),cycleDay:now.day,weightDelta:p?p.weightDelta:null,hunger:p?p.hunger:null,cravings:p?p.cravings:null,daysToNext:now.daysToNext};
}

function consistencyStatus(score,wkStrength){
  wkStrength=wkStrength||0;
  const strengthOnTrack=wkStrength>=SET.strengthGoal;
  const strengthGoing=wkStrength>0;
  if(score==null){
    // no consistency data yet, but credit strength if it's happening
    if(strengthOnTrack)return{word:'Strong week',cls:'green'};
    if(strengthGoing)return{word:'Building',cls:'clay'};
    return{word:'Getting started',cls:'clay'};
  }
  if(score>=75){
    return strengthOnTrack?{word:'Strong week',cls:'green'}:{word:'Consistent',cls:'green'};
  }
  if(score>=55){
    // mid score: if strength is locked in, frame it as momentum, not a warning
    return strengthOnTrack?{word:'Building',cls:'green'}:{word:'Holding',cls:'amber'};
  }
  // low score: never scream. If strength is still happening, you're recovering, not failing.
  if(strengthOnTrack)return{word:'Recovering',cls:'amber'};
  if(strengthGoing)return{word:'Resetting',cls:'amber'};
  return{word:'Resetting',cls:'clay'};
}
// consistency streak: consecutive days (back from today) with at least one behaviour hit
function consistencyStreak(){
  let n=0;
  for(let i=0;i<400;i++){
    const d=DB[dateKeyOff(i)];
    if(d){const c=dayCompliance(d);if(c.hits>0){n++;continue;}}
    if(i===0)continue; // today not done yet, don't break
    break;
  }
  return n;
}
// best streak ever: longest run of consecutive days with a behaviour hit
function bestStreak(){
  const keys=Object.keys(DB).sort();
  if(!keys.length)return 0;
  let best=0,run=0,prev=null;
  keys.forEach(k=>{
    const c=dayCompliance(DB[k]);
    const hit=c.hits>0;
    if(!hit){run=0;prev=k;return;}
    if(prev){
      const gap=Math.round((keyToD(k)-keyToD(prev))/86400000);
      run=(gap===1)?run+1:1;
    }else{run=1;}
    if(run>best)best=run;
    prev=k;
  });
  return best;
}
function keyToD(k){const[y,m,d]=k.split('-');return new Date(y,m-1,d);}

/* ===== trend weight ===== */
function avgWeight(windowDays){
  let sum=0,n=0;
  for(let i=0;i<windowDays;i++){const d=DB[dateKeyOff(i)];if(d&&d.weight!=null){sum+=d.weight;n++;}}
  return n?sum/n:null;
}
function weeklyRate(windowDays){
  windowDays=windowDays||30;const pts=[];
  for(let i=0;i<windowDays;i++){const d=DB[dateKeyOff(i)];if(d&&d.weight!=null)pts.push({x:-i,y:d.weight});}
  if(pts.length<2)return null;
  const n=pts.length,sx=pts.reduce((s,p)=>s+p.x,0),sy=pts.reduce((s,p)=>s+p.y,0),
    sxx=pts.reduce((s,p)=>s+p.x*p.x,0),sxy=pts.reduce((s,p)=>s+p.x*p.y,0),denom=n*sxx-sx*sx;
  if(denom===0)return null;
  return ((n*sxy-sx*sy)/denom)*7;
}
function trendWeight(){
  const series=Object.keys(DB).filter(k=>DB[k].weight!=null).sort();
  const latest=series.length?DB[series[series.length-1]].weight:null;
  return{latest,avg7:avgWeight(7),avg30:avgWeight(30),ratePerWeek:weeklyRate(30)};
}

/* ===== strength progression ===== */
function strengthProgress(windowDays){
  windowDays=windowDays||30;
  let maxWeight=0,totalVolume=0,sessions=0,earliestMax=null,latestMax=null;
  const half=windowDays/2;
  for(let i=0;i<windowDays;i++){
    const d=DB[dateKeyOff(i)];if(!d)continue;
    (d.workouts||[]).forEach(w=>{
      if(!/strength|weight|lift|resist/i.test(w.name))return;
      sessions++;
      (w.sets||[]).forEach(s=>{
        const wt=s.kg||0,reps=s.reps||0;
        if(wt>maxWeight)maxWeight=wt;
        totalVolume+=wt*reps;
        if(i>=half){if(earliestMax==null||wt>earliestMax)earliestMax=wt;}
        else{if(latestMax==null||wt>latestMax)latestMax=wt;}
      });
    });
  }
  return{maxWeight,totalVolume,sessions,earliestMax,latestMax};
}

/* ===== confidence: how much to trust the trajectory, from behaviour ===== */
// Built from things you control: consistency, strength adherence, and whether the trend is actually moving right.
function confidence(){
  const con=consistency(30);
  const wk=consistency(7);
  const tw=trendWeight();
  // need some real data to say anything
  if(con.score==null && wk.strengthSessions===0) return {score:null};
  let parts=[], weightSum=0, total=0;
  // consistency component (weight 0.5)
  if(con.score!=null){ weightSum += (con.score/100)*0.5; total+=0.5; parts.push({k:'Consistency',v:con.score+'%'}); }
  // strength adherence this week (weight 0.3)
  const strAdh=Math.min(1, wk.strengthSessions/Math.max(1,SET.strengthGoal));
  weightSum += strAdh*0.3; total+=0.3; parts.push({k:'Strength',v:wk.strengthSessions+'/'+SET.strengthGoal+' this week'});
  // trend moving the right way (weight 0.2)
  let trendComp=0.5, trendLabel='steady';
  if(tw.ratePerWeek!=null){
    if(tw.ratePerWeek<=-0.05){trendComp=1;trendLabel='improving';}
    else if(tw.ratePerWeek>=0.15){trendComp=0.2;trendLabel='drifting up';}
    else {trendComp=0.6;trendLabel='holding';}
  }
  weightSum += trendComp*0.2; total+=0.2; parts.push({k:'Trend weight',v:trendLabel});
  const score=total?Math.round(weightSum/total*100):null;
  return {score, parts};
}

function forecast(){
  const tw=trendWeight();
  const today=new Date();today.setHours(0,0,0,0);
  let weeksToGoal=null,daysToGoal=null;
  if(SET.goalDate){
    const gd=new Date(SET.goalDate);gd.setHours(0,0,0,0);
    daysToGoal=Math.round((gd-today)/86400000);weeksToGoal=daysToGoal/7;
  }
  const base=tw.avg7!=null?tw.avg7:tw.latest;
  const rate=tw.ratePerWeek;
  let projLo=null,projHi=null,centre=null;
  if(base!=null&&rate!=null&&weeksToGoal!=null&&weeksToGoal>0){
    centre=base+rate*weeksToGoal;
    const band=Math.max(0.8,weeksToGoal*0.18);
    projLo=centre-band;projHi=centre+band;
  }
  const sp=strengthProgress(30);
  let strengthProj=null;
  if(sp.maxWeight>0&&sp.earliestMax!=null&&sp.latestMax!=null&&weeksToGoal>0){
    const gain=sp.latestMax-sp.earliestMax;
    if(gain>0){const perWeek=gain/2;strengthProj={from:sp.maxWeight,lo:Math.round(sp.maxWeight+perWeek*weeksToGoal*0.5),hi:Math.round(sp.maxWeight+perWeek*weeksToGoal)};}
  }
  return{base,rate,weeksToGoal,daysToGoal,goalLabel:SET.goalLabel,goalWeight:SET.goalWeight,projLo,projHi,centre,strengthProj,sp};
}

function photoStreak(){

  for(let i=0;i<400;i++){
    const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    if(DB[k]&&DB[k].photo){

    d.setDate(d.getDate()-1);
  }

}

// plain-English status sentence — the most important line
function plainStatusSentence(con,tw,wkStrength){
  if(con.score==null||tw.avg30==null)return 'Log a few days, weight included, and your real progress picture builds here.';
  const rate=tw.ratePerWeek;
  const parts=[];
  // weight framing via trend, not daily
  if(rate!=null){
    if(rate<=-0.1)parts.push('your 30-day trend is heading down ('+Math.abs(rate).toFixed(2)+' kg/wk)');
    else if(rate>=0.15)parts.push('your 30-day trend is up a touch, worth a look at intake');
    else parts.push('your weight is holding steady on the 30-day trend');
  }
  if(wkStrength>=SET.strengthGoal)parts.push('all '+SET.strengthGoal+' strength sessions are done this week');
  else if(wkStrength>0)parts.push(wkStrength+' of '+SET.strengthGoal+' strength sessions in so far');
  if(con.score>=75)return 'You\'re on track: '+parts.join(', ')+'. Consistency is the win here, keep it rolling.';
  if(con.score>=55)return 'Holding steady: '+parts.join(', ')+'. A couple more green days lifts this.';
  return parts.join(', ').replace(/^./,c=>c.toUpperCase())+'. Don\'t chase the scale, just stack consistent days.';
}

async function runCoach(force){
  const k=todayKey(),d=day(k),t=totals(d);
  const card=document.getElementById('coachCard');
  const bodyEl=document.getElementById('coachBody');
  const ws=weeklyStrength();
  const strengthToday=d.workouts.filter(w=>/strength|weight|lift|resist/i.test(w.name)).length;

  card.classList.add('loading');
  bodyEl.innerHTML='<span class="blink">reading your day</span>';

  const con30=consistency(30);
  const sp=strengthProgress(30);
  const cStreak=consistencyStreak();
  const facts={
    consistency_30day:con30.score,
    current_streak:cStreak,
    strength_sessions_this_week:ws,
    weekly_strength_goal:WEEKLY_STRENGTH_GOAL,
    strength_heaviest_kg:sp.maxWeight||null,
    strength_climbed:(sp.earliestMax!=null&&sp.latestMax!=null&&sp.latestMax>sp.earliestMax)?(sp.earliestMax+'kg to '+sp.latestMax+'kg'):null,
    protein:Math.round(t.protein),
    protein_target:'100-120g',
    calories_eaten:t.cals,
    calorie_target:'1400-1500',
    deficit:t.hasBurn?Math.round(t.deficit):null,
    steps:d.steps,
    sleep_hours:d.sleep,
    knee_pain_0to10:d.knee,
    weight_today:d.weight,
    workouts:d.workouts.map(w=>({type:w.name,mins:w.mins,sets:w.sets||null}))
  };
  // cycle context: only present once there are 2+ cycles; reports ranges, never interprets
  const cyc=cycleCoachFact();
  if(cyc){
    facts.cycle={
      cycle_day:cyc.cycleDay!=null?cyc.cycleDay:null,
      days_until_next_period:cyc.daysToNext,
      cycles_logged:cyc.cycles,
      confidence:cyc.confidence,
      typical_weight_change_this_phase_kg:cyc.weightDelta!=null?Math.round(cyc.weightDelta*10)/10:null,
      typical_cravings_this_phase_1to5:cyc.cravings!=null?Math.round(cyc.cravings*10)/10:null
    };
  }

  const prompt=`You are a warm, direct coach for someone building consistency in a fat-loss and strength phase before a trip. Their philosophy (important): consistency and strength matter more than the daily scale. They get emotionally whiplashed by daily weight, so you do NOT lead with weight.

Here is today's and recent data (JSON). Some fields may be null if not logged:
${JSON.stringify(facts,null,2)}

Write a short motivating read, 2-3 sentences max, like a coach texting them. Rules:
- LEAD WITH BEHAVIOUR, not weight. Open with what they're DOING: strength sessions done, consistency score, their streak, protein. e.g. "That's 3 of 3 strength sessions this week" or "5-day streak holding."
- Celebrate strength progress hard when strength_climbed is set, that's their biggest real win and the scale can't show it.
- Only mention weight if it's genuinely encouraging, and frame it via trend, never a single day. If weight is flat or up, do NOT make it the headline or a problem; reassure that consistency is what counts.
- Never punitive or shaming. If something's low, nudge gently. No guilt.
- If knee pain is high (6+), acknowledge it kindly and don't push hard training.
- CYCLE: if a "cycle" object is present and weight is up today, REPORT their own history to reassure, never interpret. Say e.g. "in your logged cycles, weight around this point typically sits about +0.9kg before clearing" using typical_weight_change_this_phase_kg. Always include the confidence honestly (e.g. "though that's only based on 2 cycles so far" if confidence is Low). Never say "you're in your luteal phase" as a claim; report what their data shows. If no cycle object, say nothing about cycles.
- Wrap 1-2 key phrases in <em></em> for emphasis (the standout win or the one next thing).
- No emojis. No markdown. No em-dashes; use commas, periods or parentheses. Just the message text.`;

  try{
    const data=await callClaude([{role:'user',content:prompt}],300);
    if(!data||!Array.isArray(data.content))throw new Error('bad_response');
    let txt=data.content.filter(c=>c.type==='text').map(c=>c.text).join('').trim();
    txt=txt.replace(/—/g,', ').replace(/```/g,'');
    card.classList.remove('loading');
    bodyEl.innerHTML=txt;
    coachCache[k]={text:txt,sig:daySig(d)};
  }catch(e){
    card.classList.remove('loading');
    bodyEl.innerHTML=(SET.apiKey||'').trim()?'Could not reach the coach just now. Your numbers are all saved, try ↻ again in a moment.':'Add your Anthropic API key in settings (gear) to switch on the coach.';
  }
}

async function addFood(){
  const inp=document.getElementById('foodInput');
  const text=inp.value.trim();
  if(!text)return;
  const btn=document.getElementById('addBtn');
  const d=day();
  const pendId='p'+Date.now();
  d.food.push({name:text,cals:0,protein:0,pending:pendId});
  save();renderToday();
  inp.value='';btn.disabled=true;
  const entries=document.querySelectorAll('#todayView .entry');
  if(entries.length)entries[entries.length-1].classList.add('pending');
  try{
    const est=await estimate(text);
    const idx=d.food.findIndex(f=>f.pending===pendId);
    if(idx>-1)d.food[idx]={name:est.label||text,cals:est.calories,protein:est.protein};
    save();renderToday();
  }catch(e){
    const idx=d.food.findIndex(f=>f.pending===pendId);
    if(idx>-1)d.food.splice(idx,1);
    save();renderToday();
    if(!(SET.apiKey||'').trim()){
      toast('Add your Anthropic API key in settings (gear) to log food.',true);
    }else{
      const why=e&&e.message==='parse_fail'?'reading the estimate':e&&e.message==='bad_response'?'reaching Claude (check your key)':'estimating that';
      toast('Trouble '+why+'. Tap Log to retry.',true);
    }
  }finally{btn.disabled=false;document.getElementById('foodInput').focus()}
}
async function estimate(text){
  const prompt=`Estimate calories and protein for this casually described food. Realistic typical portions; if quantity vague assume one normal serving.\n\nFood: "${text}"\n\nRespond ONLY with JSON, no markdown/backticks:\n{"label":"short clean name","calories":number,"protein":number}`;
  const data=await callClaude([{role:'user',content:prompt}],300);
  if(!data||!Array.isArray(data.content)){
    console.error('Unexpected API response',data);
    throw new Error('bad_response');
  }
  let txt=data.content.filter(c=>c.type==='text').map(c=>c.text).join('').trim();
  txt=txt.replace(/```json|```/g,'').trim();
  // extract the JSON object even if wrapped in prose
  const a=txt.indexOf('{'),b=txt.lastIndexOf('}');
  if(a>-1&&b>a)txt=txt.slice(a,b+1);
  let o;
  try{o=JSON.parse(txt)}catch(e){console.error('Parse fail on:',txt);throw new Error('parse_fail')}
  const cals=Number(o.calories),prot=Number(o.protein);
  if(!isFinite(cals)||!isFinite(prot))throw new Error('bad_numbers');
  return{label:o.label||null,calories:Math.round(cals),protein:Math.round(prot)};
}

      if(obj.settings){SET=Object.assign({},DEFAULTS,obj.settings);saveSettings()}
      coachCache={};
      closeModal();renderToday();

}
function saveStat(){
  const v=document.getElementById('statInput').value.trim();
  day()[editing.field]=v===''?null:parseFloat(v);
  save();closeModal();renderToday();
}
function closeModal(){const m=document.getElementById('modal');if(m)m.remove();editing=null;woEditing=false}

/* ---------- history ---------- */
function renderHistory(){
  const keys=Object.keys(DB).sort().reverse();
  const withData=keys.filter(k=>{const t=totals(DB[k]);return t.cals>0||t.hasBurn});
  const recent=withData.slice(0,7).filter(k=>totals(DB[k]).hasBurn);
  const avg=recent.length?Math.round(recent.reduce((s,k)=>s+totals(DB[k]).deficit,0)/recent.length):null;
  const weeklyLoss=avg?(avg*7/7700).toFixed(2):null;
  const ws=weeklyStrength();

  const weights=keys.filter(k=>DB[k].weight!=null).sort();
  let weightNote='';
  if(weights.length>=2){
    const first=DB[weights[0]].weight,last=DB[weights[weights.length-1]].weight;
    const diff=(last-first).toFixed(1);
    weightNote=`${last} kg now · ${diff>0?'+':''}${diff} kg since ${shortDate(weights[0])}`;
  }else if(weights.length===1){weightNote=`${DB[weights[0]].weight} kg logged`}

  let avgCard=`<div class="avgcard">
    <div class="lab">7-day average deficit</div>
    <div class="big ${avg==null?'':deficitClass(avg,true)}">${avg==null?'—':(avg>=0?'−':'+')+Math.abs(avg)}</div>
    <div class="note">${avg==null?'Log a few days with watch stats to see your trend.':'≈ '+weeklyLoss+' kg/week at this pace. Target is 0.70. Strength this week: '+ws+'/'+WEEKLY_STRENGTH_GOAL+'.'}</div>
  </div>`;

  const chartKeys=withData.filter(k=>totals(DB[k]).hasBurn).slice(0,14).reverse();
  const maxD=Math.max(900,...chartKeys.map(k=>totals(DB[k]).deficit));
  let chart='';
  if(chartKeys.length){
    chart=`<div class="sect">Last ${chartKeys.length} days</div><div class="hbars">`+
      chartKeys.map(k=>{const def=totals(DB[k]).deficit;const h=Math.max(3,def/maxD*100);const c=deficitClass(def,true);return `<div class="hb ${c==='clay'?'':c}" style="height:${h}%" title="${shortDate(k)}: ${Math.round(def)}"></div>`}).join('')+`</div>`;
  }

  let weightCard=weightNote?`<div class="hrow" style="margin-bottom:14px"><div class="top"><div class="d">Weight</div></div><div class="meta"><b>${weightNote}</b></div></div>`:'';

  let rows=withData.length?withData.map(k=>{
    const d=DB[k],t=totals(d);
    const cls=deficitClass(t.deficit,t.hasBurn);
    return `<div class="hrow">
      <div class="top">
        <div><span class="d">${shortDate(k).split(' ')[0]}</span><span class="dd">${shortDate(k).split(' ').slice(1).join(' ')}</span></div>
        <div class="def ${cls}">${t.hasBurn?(t.deficit>=0?'−':'+')+Math.abs(Math.round(t.deficit)):'—'}</div>
      </div>
      <div class="meta">
        <span><b>${t.cals}</b> eaten</span>
        <span><b>${Math.round(t.protein)}g</b> protein</span>
        ${d.steps?`<span><b>${(d.steps/1000).toFixed(1)}k</b> steps</span>`:''}
        ${d.weight?`<span><b>${d.weight}kg</b></span>`:''}
        ${d.workouts.length?`<span><b>${d.workouts.length}</b> workout${d.workouts.length>1?'s':''}</span>`:''}
        ${d.photo?`<span><b>📷</b></span>`:''}
      </div>
    </div>`;
  }).join(''):`<div class="empty">No history yet. Start logging today and it builds here.</div>`;

  document.getElementById('historyView').innerHTML=avgCard+chart+weightCard+`<div class="sect">Daily log</div>`+rows;
}

function setView(v){
  view=v;
  ['today','week','cycle','forecast','history'].forEach(name=>{
    document.getElementById(name+'View').style.display=(v===name)?'block':'none';
  });
  document.getElementById('dock').style.display=(v==='today')?'block':'none';
  document.querySelectorAll('.vn').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
  if(v==='today')renderToday();
  else if(v==='week')renderWeek();
  else if(v==='cycle')renderCycle();
  else if(v==='forecast')renderForecast();
  else if(v==='history')renderHistory();
  window.scrollTo(0,0);
}

/* ===== weekly review ===== */
function renderWeek(){
  const con=consistency(7);
  const status=consistencyStatus(con.score,con.strengthSessions);
  const tw=trendWeight();
  // week's weight change: avg of last 7 days weigh-ins vs prior 7
  let thisWk=avgWeight(7), priorWk=null;
  {let sum=0,n=0;for(let i=7;i<14;i++){const d=DB[dateKeyOff(i)];if(d&&d.weight!=null){sum+=d.weight;n++;}}priorWk=n?sum/n:null;}
  const wkChange=(thisWk!=null&&priorWk!=null)?(thisWk-priorWk):null;
  // averages over 7 days
  let cals=0,cn=0,prot=0,pn=0,steps=0,sn=0,sleep=0,sln=0;
  for(let i=0;i<7;i++){const d=DB[dateKeyOff(i)];if(!d)continue;const t=totals(d);
    if(d.food.length){cals+=t.cals;cn++;prot+=t.protein;pn++;}
    if(d.steps!=null){steps+=d.steps;sn++;}
    if(d.sleep!=null){sleep+=d.sleep;sln++;}}
  const sp=strengthProgress(7);
  // best achievement
  let best='Consistent week logged';
  const sp30=strengthProgress(30);
  if(sp30.earliestMax!=null&&sp30.latestMax!=null&&sp30.latestMax>sp30.earliestMax){
    best='Heaviest lift up '+sp30.earliestMax+'kg → '+sp30.latestMax+'kg';
  }else if(con.strengthSessions>=SET.strengthGoal){best='All '+SET.strengthGoal+' strength sessions done';}
  else if(con.score!=null&&con.score>=80){best=con.score+'% consistency, a strong week';}

  const rate=tw.ratePerWeek;
  document.getElementById('weekView').innerHTML=`
    <div class="hero conhero">
      <div class="statusrow"><div class="statusword ${status.cls}">${status.word}</div><div class="countdown" onclick="openSettings()">${goalCountdownLabel()}</div></div>
      <div class="conscore ${status.cls}">${con.score==null?'—':con.score+'<small>%</small>'}</div>
      <div class="conlab">This week's consistency</div>
    </div>
    <div class="wkgrid">
      ${wkStat('Weight trend',wkChange==null?'—':(wkChange<=0?'↓ ':'↑ ')+Math.abs(wkChange).toFixed(1)+' kg',wkChange==null?'':(wkChange<=0?'green':'amber'))}
      ${wkStat('Avg calories',cn?Math.round(cals/cn):'—','')}
      ${wkStat('Avg protein',pn?Math.round(prot/pn)+'g':'—','')}
      ${wkStat('Strength',con.strengthSessions+'/'+SET.strengthGoal,con.strengthSessions>=SET.strengthGoal?'green':'')}
      ${wkStat('Avg steps',sn?(steps/sn/1000).toFixed(1)+'k':'—','')}
      ${wkStat('Avg sleep',sln?(sleep/sln).toFixed(1)+'h':'—','')}
    </div>
    <div class="bestcard">
      <div class="bk">Best this week</div>
      <div class="bv">${best}</div>
    </div>
    <div class="sect">The week in one line</div>
    <div class="statusline" style="margin-bottom:20px">${plainStatusSentence(consistency(30),tw,consistency(7).strengthSessions)}</div>
  `;
}
function wkStat(label,val,cls){
  return `<div class="wkcell"><div class="wk">${label}</div><div class="wv ${cls}">${val}</div></div>`;
}

/* ===== forecaster ===== */
/* ===== cycle tab ===== */
function renderCycle(){
  const now=cycleNow();
  const conf=cycleConfidence();
  const L=cycleLen();
  let head;
  if(now.day==null){
    head=`<div class="empty">Tap "Period started today" on day one of your next period (in the Today tab, Cycle section) to start tracking. Everything here builds from that.</div>`;
    document.getElementById('cycleView').innerHTML=cycleHeader(conf)+head;
    return;
  }
  const dInCycle=((now.day-1)%L)+1;
  const phase=softPhase(now.day);
  const overdue=now.overdue;
  head=`
    <div class="cyclenow">
      <div class="cnday">Cycle day <b>${dInCycle}</b></div>
      <div class="cnnext">${overdue?'Period overdue (expected by now)':'Estimated '+now.daysToNext+' day'+(now.daysToNext===1?'':'s')+' until next period'}</div>
      <div class="cnphase">${phase}</div>
    </div>`;

  // pattern table — only with enough data
  let table;
  if(conf.n<2){
    table=`<div class="cyclelocked">
      <div class="clk">Patterns appear after 2+ cycles</div>
      <div class="cls">Keep tapping your period start and logging energy, hunger, cravings and bloating. Once there are a couple of full cycles, this fills with <b>your own</b> patterns, including how your weight naturally shifts across the month. Right now there ${conf.n===1?'is 1 cycle':'are '+conf.n+' cycles'} logged.</div>
    </div>`;
  }else{
    const pat=patternByPhase();
    const order=['Menstrual','Follicular','Ovulation','Late cycle'];
    const rows=order.map(b=>{
      const p=pat[b];if(!p||p.days===0)return '';
      const wd=p.weightDelta;
      const wdStr=wd==null?'—':(wd>=0?'+':'')+wd.toFixed(1)+'kg';
      const wdCls=wd==null?'':(wd<=-0.1?'green':wd>=0.3?'amber':'');
      const cur=(cycleBucket(now.day)===b);
      return `<tr class="${cur?'cur':''}">
        <td class="pn">${b}${cur?' <span class="nowtag">now</span>':''}</td>
        <td class="${wdCls}">${wdStr}</td>
        <td>${p.energy==null?'—':p.energy.toFixed(1)}</td>
        <td>${p.cravings==null?'—':p.cravings.toFixed(1)}</td>
        <td>${p.knee==null?'—':p.knee.toFixed(1)}</td>
      </tr>`;
    }).join('');
    table=`
      <div class="sect">Your patterns <span class="hint">${conf.level.toLowerCase()} confidence · ${conf.n} cycles</span></div>
      <div class="ptable">
        <table>
          <thead><tr><th>Phase</th><th>Weight</th><th>Energy</th><th>Cravings</th><th>Knee</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="cyclenote">Weight column shows how your weight typically sits in each phase versus that cycle's own average. A late-cycle "+" is water, not fat, it clears. This is your data, not a textbook.</div>`;
  }
  document.getElementById('cycleView').innerHTML=cycleHeader(conf)+head+table;
}
function cycleHeader(conf){
  const cls=conf.level==='High'?'green':conf.level==='Moderate'?'amber':'clay';
  return `<div class="hero conhero">
    <div class="statusrow"><div class="statusword clay">Cycle</div><div class="countdown" onclick="openSettings()">${cycleLen()}-day · edit</div></div>
    <div class="conlab" style="margin-top:4px">Your own patterns, reported not predicted · <span class="${cls}" style="font-weight:700">${conf.level} confidence</span></div>
  </div>`;
}

function renderForecast(){
  const f=forecast();
  const tw=trendWeight();
  let body;
  if(f.base==null||f.weeksToGoal==null){
    body=`<div class="empty">Set a goal date in settings and log a few weigh-ins. Your forecast builds from your real trend, not a fantasy number.</div>`;
  }else if(f.weeksToGoal<=0){
    body=`<div class="empty">Your goal date has passed. Set a new one in settings and the forecast re-frames around it.</div>`;
  }else if(f.projLo==null){
    body=`<div class="empty">Log a few more weigh-ins (a couple of weeks) so there's a real trend to project. One or two points isn't enough to be honest about.</div>`;
  }else{
    const lo=Math.min(f.projLo,f.projHi),hi=Math.max(f.projLo,f.projHi);
    const losing=f.rate<-0.05;
    const flat=Math.abs(f.rate)<=0.05;
    let weightLine,leverLine;
    if(losing){
      weightLine=`At your current trend, you're heading toward roughly <b>${lo.toFixed(1)}–${hi.toFixed(1)} kg</b> by ${f.goalLabel}.`;
      leverLine=`That's a real, sustainable pace. Hold your consistency and it keeps going.`;
    }else if(flat){
      weightLine=`Your weight's holding around <b>${f.base.toFixed(1)} kg</b>, so the honest projection is roughly <b>${lo.toFixed(1)}–${hi.toFixed(1)} kg</b> by ${f.goalLabel}.`;
      leverLine=`If you want the scale moving, a slightly bigger deficit or one more consistent week each fortnight is the lever, not a crash.`;
    }else{
      weightLine=`Your recent trend is gently up, so a straight projection lands around <b>${lo.toFixed(1)}–${hi.toFixed(1)} kg</b>.`;
      leverLine=`Worth a look at intake consistency. The trend turns with a few more green days, not drastic cuts.`;
    }
    let strengthBlock='';
    if(f.strengthProj){
      strengthBlock=`
        <div class="fcard">
          <div class="fck">Strength projection</div>
          <div class="fcbig">${f.strengthProj.from}kg → ${f.strengthProj.lo}–${f.strengthProj.hi}kg</div>
          <div class="fcsub">If you keep training at this rate, your heaviest working sets climb toward this by ${f.goalLabel}. This is the win that doesn't show on the scale.</div>
        </div>`;
    }
    body=`
      <div class="fcard hero-f">
        <div class="fck">Weight, projected as a range</div>
        <div class="fcbig">${lo.toFixed(1)}–${hi.toFixed(1)} <small>kg</small></div>
        <div class="fcsub">${weightLine} ${leverLine}</div>
      </div>
      ${strengthBlock}
      <div class="fcard">
        <div class="fck">What ${f.weeksToGoal>=2?Math.floor(f.weeksToGoal)+' weeks':f.daysToGoal+' days'} of consistency builds</div>
        <div class="fcsub">Sustained strength work plus a steady deficit is the recipe for visible muscle definition and a leaner, stronger shape. That's what this pace is building toward, not a number on a date, a body that feels different. Keep stacking the days.</div>
      </div>
      <div class="fnote">Ranges, not promises. Real life (sleep, cycle, a knee flare) moves the scale week to week. The range is honest about that; your consistency is what actually decides where you land.</div>
    `;
  }
  const conf=confidence();
  let confCard='';
  if(conf.score!=null){
    const cls=conf.score>=75?'green':conf.score>=55?'amber':'red';
    const verdict=conf.score>=75?'You\'re doing the things that work. The projection below is trustworthy because the behaviour under it is real.'
      :conf.score>=55?'Solid foundation. Tighten a couple of behaviours and both your confidence and your results climb.'
      :'Behaviour\'s a bit patchy right now, so treat the projection below loosely. Stack a few consistent days and this number, and the forecast, get more reliable.';
    confCard=`
      <div class="fcard hero-f">
        <div class="fck">Confidence</div>
        <div class="fcbig ${cls}">${conf.score}<small>%</small></div>
        <div class="confparts">${conf.parts.map(p=>`<span><b>${p.k}:</b> ${p.v}</span>`).join('')}</div>
        <div class="fcsub" style="margin-top:8px">${verdict}</div>
      </div>`;
  }
  document.getElementById('forecastView').innerHTML=`
    <div class="hero conhero">
      <div class="statusrow"><div class="statusword clay">Forecast</div><div class="countdown" onclick="openSettings()">${goalCountdownLabel()}</div></div>
      <div class="conlab" style="margin-top:4px">How you're doing, and where it points</div>
    </div>
    ${confCard}
    ${body}
  `;
}

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function toast(msg,isErr){const t=document.createElement('div');t.className='toast'+(isErr?' err':'');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2600)}
document.getElementById('foodInput').addEventListener('keydown',e=>{if(e.key==='Enter')addFood()});

renderToday();
</script>
